version: 2

project_name: admiral-server

env:
  - CGO_ENABLED=0

dist: dist

git:
  tag_sort: -version:refname

gomod:
  proxy: false

report_sizes: true

before:
  hooks:
    - go mod download
    - make web
    - go run cmd/assets/generate.go ./web/build

snapshot:
  version_template: "{{ incpatch .Version }}-dev"

builds:
  - id: admiral-server
    binary: admiral-server
    main: .
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -tags=withAssets -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.FullCommit}}
      - -X main.date={{.Date}}
      - -X main.builtBy=Admiral

universal_binaries:
  - replace: false

archives:
  - id: admiral-server
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}-v{{ .Version }}_{{ .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - LICENSE
      - README.md
      - config.yaml

nfpms:
  - id: admiral-server
    file_name_template: "{{ .ConventionalFileName }}"
    maintainer: Admiral <support@admiral.io>
    description: Admiral - Platform Orchestrator
    homepage: https://admiral.io
    license: AGPL-3.0-only
    vendor: Admiral
    bindir: /usr/bin
    section: utils
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/admiral-server/copyright
        file_info:
          mode: 0644
      - src: ./config.yaml
        dst: /etc/admiral-server/config.yaml
        type: config
        file_info:
          mode: 0644
      - src: ./deploy/systemd/admiral-server.service
        dst: /lib/systemd/system/admiral-server.service
        file_info:
          mode: 0644
    formats:
      - apk
      - deb
      - rpm
      - archlinux
    deb:
      lintian_overrides:
        - statically-linked-binary
        - changelog-file-missing-in-native-package

dockers_v2:
  - images:
      - "ghcr.io/admiral-io/admiral-server"
    dockerfile: Dockerfile
    tags:
      - "{{ if .IsSnapshot }}edge{{ else }}{{ .Tag }}{{ end }}"
      - "{{ if .IsSnapshot }}edge-{{ .ShortCommit }}{{ else }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    flags:
      - "--pull"
    labels:
      io.artifacthub.package.maintainers: '[{"name":"Admiral","email":"support@admiral.io"}]'
      io.artifacthub.package.license: "AGPL-3.0-only"
      org.opencontainers.image.title: "{{.ProjectName}}"
      org.opencontainers.image.description: "Admiral - Platform Orchestrator"
      org.opencontainers.image.licenses: "AGPL-3.0-only"
      org.opencontainers.image.created: "{{.Date}}"
      org.opencontainers.image.name: "{{.ProjectName}}"
      org.opencontainers.image.revision: "{{.FullCommit}}"
      org.opencontainers.image.version: "{{.Version}}"
      org.opencontainers.image.source: "{{.GitURL}}"
    extra_files:
      - config.yaml

brews:
  - name: admiral-server
    repository:
      owner: admiral-io
      name: homebrew-tap
    directory: Formula
    homepage: https://admiral.io/
    description: Admiral - Platform Orchestrator
    license: AGPL-3.0-only
    install: |
      bin.install "admiral-server"
    commit_author:
      name: admiral-ci
      email: support@admiral.io

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --yes
      - --bundle=${signature}
      - ${artifact}

docker_signs:
  - cmd: cosign
    artifacts: images
    output: true
    args:
      - sign
      - --yes
      - ${artifact}@${digest}

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^chore:"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  groups:
    - title: "Features"
      regexp: '^feat(\([[:word:]]+\))?!?:.+$'
      order: 100
    - title: "Security Updates"
      regexp: '^sec(\([[:word:]]+\))?!?:.+$'
      order: 200
    - title: "Bug Fixes"
      regexp: '^fix(\([[:word:]]+\))?!?:.+$'
      order: 300
    - title: "Dependency Updates"
      regexp: '^(feat|fix)\(deps\)!?:.+$'
      order: 400
    - title: "Documentation Updates"
      regexp: '^doc(\([[:word:]]+\))?!?:.+$'
      order: 500
    - title: "Build Process Updates"
      regexp: '^build(\([[:word:]]+\))?!?:.+$'
      order: 600
    - title: "Other Changes"
      order: 9999

release:
  footer: |
    **Full Changelog**: https://github.com/admiral-io/admiral/compare/{{ .PreviousTag }}...{{ .Tag }}

    ## Helping out
    This release ({{ .Version }}) was built on {{ .Date }}{{ if .Env.GITHUB_ACTOR }} by {{ .Env.GITHUB_ACTOR }}{{ end }}.
    Thanks to **all** the awesome people who made it possible!